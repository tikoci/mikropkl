name: "Test: Libvirt / QEMU Boot"

# Builds each QEMU manifest and boots it under qemu-system on arch-specific
# GitHub runners to verify RouterOS starts successfully.
# Verification: POST /rest/system/check-installation with {"duration":"30s"} must
# return an array whose last element has {"status":"installation is ok"}
# NOTE: check-installation is skipped on aarch64 — the ARM checker binary always
# fails in QEMU due to missing DTB capability files (see CLAUDE.md for details).
#
# Does NOT publish a release or push tags. CI-only.

on:
  workflow_dispatch:
    inputs:
      rosver:
        type: string
        description: 'RouterOS Version (e.g. 7.22, 7.22rc2, 7.22beta4, stable)'
        required: true
        default: "stable"
      pklversion:
        type: string
        description: 'pkl Version'
        required: true
        default: "0.30.2"

jobs:
  # ── Phase 1: build all QEMU machine bundles ───────────────────────────────
  # We build on ubuntu-latest (x86_64); pkl just generates files, no arch needed.
  build:
    runs-on: ubuntu-latest
    outputs:
      # JSON array of machine dir names that have a libvirt.xml, e.g.
      # ["chr.aarch64.qemu.7.22.utm","chr.x86_64.qemu.7.22.utm", ...]
      qemu-machines: ${{ steps.list-machines.outputs.machines }}
      chr-version: ${{ steps.resolve-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        # qemu-utils provides qemu-img (needed by make phase2 for extra disks)
        # wget for image downloads, libxml2-utils for xmllint, jq for JSON output
        run: |
          sudo apt-get update -y
          sudo apt-get install -y qemu-utils wget libxml2-utils make unzip zip jq

      - name: Install Apple pkl
        run: |
          curl -L -o pkl "https://github.com/apple/pkl/releases/download/${{ github.event.inputs.pklversion }}/pkl-linux-amd64"
          chmod +x pkl
          ./pkl --version
          sudo cp ./pkl /usr/local/bin/pkl

      - name: Resolve RouterOS version
        id: resolve-version
        run: |
          VERSION=$(CHR_VERSION=${{ github.event.inputs.rosver }} pkl eval ./Pkl/chr-version.pkl)
          echo "Resolved RouterOS version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build machine bundles (make)
        run: make CHR_VERSION=${{ steps.resolve-version.outputs.version }}
        env:
          LIBVIRT_OUTPUT: "true"

      - name: List QEMU machines with libvirt.xml
        id: list-machines
        run: |
          machines=$(ls Machines/ | grep '\.utm$' | while read -r d; do
            [ -f "Machines/$d/libvirt.xml" ] && echo "$d"
          done | jq -R -s -c 'split("\n")[:-1]')
          echo "QEMU machines: $machines"
          echo "machines=$machines" >> $GITHUB_OUTPUT

      - name: Upload built Machines as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Machines
          path: ./Machines
          # Retain for 1 day — only needed for the test jobs below
          retention-days: 1

  # ── Phase 2: boot-test — one job per machine, arch-matched runner ──────────
  test:
    needs: build
    strategy:
      matrix:
        machine: ${{ fromJSON(needs.build.outputs.qemu-machines) }}
      # Run all tests independently; don't abort all if one arch fails
      fail-fast: false

    # Select runner by architecture in the machine directory name.
    # "chr.aarch64.qemu.7.22.utm" → ubuntu-24.04-arm  (native ARM64)
    # "chr.x86_64.qemu.7.22.utm"  → ubuntu-latest     (x86_64)
    runs-on: ${{ contains(matrix.machine, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    env:
      LIBVIRT_XML: ./Machines/${{ matrix.machine }}/libvirt.xml
      # REST API base with admin credentials (empty password is RouterOS default)
      API_BASE: http://admin:@localhost:9180/rest
      # Plain HTTP root — used for the health-check poll (returns 200 without auth)
      HEALTH_URL: http://localhost:9180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built Machines artifact
        uses: actions/download-artifact@v4
        with:
          name: Machines
          path: ./Machines

      - name: Install QEMU and XML tools
        run: |
          sudo apt-get update -y
          if echo "${{ matrix.machine }}" | grep -q 'aarch64'; then
            # qemu-system-arm: aarch64 emulator
            # qemu-efi-aarch64: provides QEMU_EFI.fd UEFI firmware for virt machine
            sudo apt-get install -y qemu-system-arm qemu-efi-aarch64 libxml2-utils
          else
            sudo apt-get install -y qemu-system-x86 libxml2-utils
          fi

      - name: Enable KVM
        # Apply udev rules first (required to make /dev/kvm user-accessible),
        # then check if KVM is actually usable. Matches the pattern from reference
        # workflows. KVM is available on ubuntu-latest (x86_64)
        # but may not be on ubuntu-24.04-arm — udevadm trigger can fail there,
        # so we must tolerate that failure and fall back to software emulation.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          if ls -la /dev/kvm 2>/dev/null; then
            echo "KVM_AVAIL=1" >> $GITHUB_ENV
            echo "KVM is available."
          else
            echo "KVM_AVAIL=0" >> $GITHUB_ENV
            echo "::warning::KVM not available — QEMU will use software emulation (slower)"
          fi

      - name: Extract VM parameters from libvirt.xml
        id: vmparams
        run: |
          xp() { xmllint --xpath "string($1)" "$LIBVIRT_XML" 2>/dev/null; }
          ARCH=$(xp '/domain/os/type/@arch')
          MACHINE=$(xp '/domain/os/type/@machine')
          MEM=$(xp '/domain/memory')
          VCPU=$(xp '/domain/vcpu')
          EMULATOR=$(xp '/domain/devices/emulator')
          DISK_COUNT=$(xmllint --xpath 'count(/domain/devices/disk)' "$LIBVIRT_XML" 2>/dev/null)
          echo "arch=$ARCH"         >> $GITHUB_OUTPUT
          echo "machine=$MACHINE"   >> $GITHUB_OUTPUT
          echo "mem=$MEM"           >> $GITHUB_OUTPUT
          echo "vcpu=$VCPU"         >> $GITHUB_OUTPUT
          echo "emulator=$EMULATOR" >> $GITHUB_OUTPUT
          echo "disk_count=$DISK_COUNT" >> $GITHUB_OUTPUT
          echo "VM: arch=$ARCH machine=$MACHINE mem=${MEM}MiB vcpu=$VCPU disks=$DISK_COUNT"
          echo "Emulator: $EMULATOR"

      - name: Configure arch- and KVM-specific QEMU flags
        # Sets QEMU_KVM_FLAGS, QEMU_CPU_FLAGS, QEMU_UEFI_FLAGS, QEMU_MISC_FLAGS, BOOT_TIMEOUT_ATTEMPTS
        run: |
          ARCH="${{ steps.vmparams.outputs.arch }}"

          if [ "$KVM_AVAIL" = "1" ]; then
            echo "QEMU_KVM_FLAGS=-enable-kvm" >> $GITHUB_ENV
            echo "QEMU_CPU_FLAGS=-cpu host"   >> $GITHUB_ENV
            # KVM is fast: RouterOS typically up in 15-45s; allow 2 min
            echo "BOOT_TIMEOUT_ATTEMPTS=12"   >> $GITHUB_ENV
          else
            echo "QEMU_KVM_FLAGS="            >> $GITHUB_ENV
            if [ "$ARCH" = "aarch64" ]; then
              # aarch64 TCG: cortex-a710 matches UTM config.plist CPU setting and is
              # the CPU model RouterOS CHR ARM64 is validated against
              echo "QEMU_CPU_FLAGS=-cpu cortex-a710" >> $GITHUB_ENV
              # Software emulation is slower — allow 4 min / 24 attempts × 10s
              echo "BOOT_TIMEOUT_ATTEMPTS=24" >> $GITHUB_ENV
            else
              # x86_64 TCG uses a reasonable default; no flag needed
              echo "QEMU_CPU_FLAGS="          >> $GITHUB_ENV
              echo "BOOT_TIMEOUT_ATTEMPTS=18" >> $GITHUB_ENV
            fi
          fi

          # aarch64 virt machine type needs UEFI firmware; search known locations.
          # Prefer AAVMF_CODE.fd (64 MiB, properly paired with AAVMF_VARS.fd) over
          # the compact QEMU_EFI.fd (only 2 MiB on ubuntu-24.04-arm native runners).
          # Both files must be the same size for pflash to work.
          if [ "$ARCH" = "aarch64" ]; then
            UEFI_CODE=""
            for p in \
              /usr/share/AAVMF/AAVMF_CODE.fd \
              /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
              /usr/share/edk2/aarch64/QEMU_EFI.fd; do
              if [ -f "$p" ]; then UEFI_CODE="$p"; break; fi
            done
            if [ -z "$UEFI_CODE" ]; then
              echo "::error::No UEFI firmware found for aarch64 — install qemu-efi-aarch64"
              exit 1
            fi
            # Use pflash mode (not -bios) so UEFI has a writable NVRAM (pflash1).
            # -bios only provides the code ROM with no writable variable store, which
            # can prevent EDK2 from completing initialisation on newer QEMU versions.
            # Try to find a vars file from the same "family" as the code ROM for an
            # exact size match. Fall back to any vars file then truncate to match.
            UEFI_VARS_SRC=""
            case "$UEFI_CODE" in
              */AAVMF_CODE.fd)
                # Prefer the matched AAVMF_VARS.fd from same directory
                AAVMF_DIR=$(dirname "$UEFI_CODE")
                [ -f "$AAVMF_DIR/AAVMF_VARS.fd" ] && UEFI_VARS_SRC="$AAVMF_DIR/AAVMF_VARS.fd" ;;
              */QEMU_EFI.fd)
                EFI_DIR=$(dirname "$UEFI_CODE")
                [ -f "$EFI_DIR/QEMU_VARS.fd" ] && UEFI_VARS_SRC="$EFI_DIR/QEMU_VARS.fd" ;;
            esac
            # Generic fallback search if matched vars not found
            if [ -z "$UEFI_VARS_SRC" ]; then
              for v in \
                /usr/share/AAVMF/AAVMF_VARS.fd \
                /usr/share/qemu-efi-aarch64/QEMU_VARS.fd \
                /usr/share/edk2/aarch64/QEMU_VARS.fd; do
                if [ -f "$v" ]; then UEFI_VARS_SRC="$v"; break; fi
              done
            fi
            CODE_SIZE=$(stat -Lc%s "$UEFI_CODE")
            # Sanity check: UEFI code ROM must be at least 1 MiB (real firmware is 64 MiB).
            # A tiny size likely means stat read a symlink's path length instead of the target.
            if [ "$CODE_SIZE" -lt 1048576 ]; then
              echo "::error::UEFI code ROM $UEFI_CODE is only $CODE_SIZE bytes — expected ~64 MiB. Is it a broken symlink?"
              ls -la "$UEFI_CODE"
              exit 1
            fi
            if [ -n "$UEFI_VARS_SRC" ]; then
              cp "$UEFI_VARS_SRC" /tmp/qemu-efi-vars.fd
              echo "UEFI vars: $UEFI_VARS_SRC ($(stat -Lc%s "$UEFI_VARS_SRC") bytes) -> /tmp/qemu-efi-vars.fd"
            else
              echo "::warning::No UEFI VARS file found; creating empty placeholder"
              touch /tmp/qemu-efi-vars.fd
            fi
            # Both pflash units must be identical size. Truncate/pad vars to match code ROM.
            truncate -s "$CODE_SIZE" /tmp/qemu-efi-vars.fd
            echo "UEFI code: $UEFI_CODE ($CODE_SIZE bytes)"
            echo "UEFI vars file size set to $CODE_SIZE bytes (matches code ROM)"
            # pflash unit=0 → code (read-only), unit=1 → vars (writable)
            echo "QEMU_UEFI_FLAGS=-drive if=pflash,format=raw,readonly=on,unit=0,file=$UEFI_CODE -drive if=pflash,format=raw,unit=1,file=/tmp/qemu-efi-vars.fd" >> $GITHUB_ENV
            echo "UEFI firmware: $UEFI_CODE (code) + /tmp/qemu-efi-vars.fd (vars)"
          else
            echo "QEMU_UEFI_FLAGS=" >> $GITHUB_ENV
          fi

          # Disable VGA device on aarch64: RouterOS has display driver issues on ARM
          # (matches UTM config which sets Display to empty array on aarch64)
          if [ "$ARCH" = "aarch64" ]; then
            echo "QEMU_MISC_FLAGS=-vga none" >> $GITHUB_ENV
          else
            echo "QEMU_MISC_FLAGS=" >> $GITHUB_ENV
          fi

          # TCG translation block cache size (matches UTM setting)
          if [ "$KVM_AVAIL" != "1" ]; then
            echo "QEMU_ACCEL_FLAGS=-accel tcg,tb-size=256" >> $GITHUB_ENV
          else
            echo "QEMU_ACCEL_FLAGS=" >> $GITHUB_ENV
          fi

      - name: Build QEMU drive flags from libvirt.xml
        # Extracts ALL disk entries so ROSE multi-disk machines mount all volumes.
        # aarch64: Use explicit virtio-blk-pci device (if=none + -device virtio-blk-pci).
        #   UTM's ps output confirms this is what works: virtio-blk-pci not NVMe,
        #   and not the if=virtio shorthand which resolves to virtio-blk-device (MMIO)
        #   rather than the PCI variant on the virt machine type.
        # x86_64: standard if=virtio shorthand is fine on q35.
        id: driveflags
        run: |
          ARCH="${{ steps.vmparams.outputs.arch }}"
          DRIVE_FLAGS=""
          COUNT="${{ steps.vmparams.outputs.disk_count }}"
          echo "Mounting $COUNT disk(s) (arch=$ARCH):"
          for idx in $(seq 1 "$COUNT"); do
            FILE=$(xmllint --xpath "string(/domain/devices/disk[$idx]/source/@file)" "$LIBVIRT_XML" 2>/dev/null)
            FMT=$(xmllint --xpath  "string(/domain/devices/disk[$idx]/driver/@type)"  "$LIBVIRT_XML" 2>/dev/null)
            DRV_ID="drive$idx"
            echo "  disk $idx: $FILE (format=$FMT)"
            if [ "$ARCH" = "aarch64" ]; then
              # Explicit virtio-blk-pci: matches UTM QEMU args exactly
              DRIVE_FLAGS="$DRIVE_FLAGS -drive file=$FILE,format=$FMT,if=none,id=$DRV_ID"
              DRIVE_FLAGS="$DRIVE_FLAGS -device virtio-blk-pci,drive=$DRV_ID,bootindex=$((idx - 1))"
            else
              DRIVE_FLAGS="$DRIVE_FLAGS -drive file=$FILE,format=$FMT,if=virtio"
            fi
          done
          # Trim leading space
          DRIVE_FLAGS="${DRIVE_FLAGS# }"
          echo "drive_flags=$DRIVE_FLAGS" >> $GITHUB_OUTPUT

      - name: Validate libvirt XML against schema
        # virt-xml-validate ships with libvirt-clients (heavy dep); skip gracefully if absent
        run: |
          if command -v virt-xml-validate &>/dev/null; then
            virt-xml-validate "$LIBVIRT_XML" domain && echo "XML validates OK"
          else
            echo "::notice::virt-xml-validate not installed, skipping schema validation"
          fi

      - name: Pre-launch diagnostics
        # Show firmware and disk file sizes to help debug pflash mismatches
        run: |
          ARCH="${{ steps.vmparams.outputs.arch }}"
          echo "=== Disk files ==="
          ls -la ./Machines/${{ matrix.machine }}/Data/ || true
          if [ "$ARCH" = "aarch64" ]; then
            echo "=== UEFI firmware files (follow symlinks) ==="
            ls -laL /usr/share/qemu-efi-aarch64/ 2>/dev/null || true
            ls -laL /usr/share/AAVMF/ 2>/dev/null || true
            echo "=== pflash vars file ==="
            ls -laL /tmp/qemu-efi-vars.fd 2>/dev/null || echo "No vars file yet"
          fi
          echo "=== QEMU binary ==="
          qemu-system-$ARCH --version 2>/dev/null | head -1 || true

      - name: Start RouterOS CHR in QEMU
        run: |
          EMULATOR="${{ steps.vmparams.outputs.emulator }}"
          # Fall back to the arch-appropriate binary on PATH if libvirt.xml path differs
          if [ ! -x "$EMULATOR" ]; then
            BINARY="qemu-system-${{ steps.vmparams.outputs.arch }}"
            EMULATOR=$(command -v "$BINARY") || { echo "::error::$BINARY not found on PATH"; exit 1; }
            echo "::notice::Using $EMULATOR (path from libvirt.xml not found)"
          fi
          echo "Launching: $EMULATOR"
          echo "  machine : ${{ steps.vmparams.outputs.machine }}"
          echo "  mem     : ${{ steps.vmparams.outputs.mem }} MiB"
          echo "  vcpu    : ${{ steps.vmparams.outputs.vcpu }}"
          echo "  drives  : ${{ steps.driveflags.outputs.drive_flags }}"
          echo "  kvm     : $QEMU_KVM_FLAGS $QEMU_CPU_FLAGS"
          echo "  uefi    : $QEMU_UEFI_FLAGS"
          echo "  misc    : $QEMU_MISC_FLAGS"
          echo "  accel   : $QEMU_ACCEL_FLAGS"
          # shellcheck disable=SC2086  (word-splitting intentional for flag expansion)
          #
          # IMPORTANT: Do NOT use -nographic here. It redirects serial to stdio,
          # which blocks indefinitely when QEMU is backgrounded (&) because there
          # is no interactive terminal. Use -display none + explicit serial chardev.
          nohup $EMULATOR \
            $QEMU_KVM_FLAGS \
            $QEMU_CPU_FLAGS \
            $QEMU_UEFI_FLAGS \
            $QEMU_MISC_FLAGS \
            $QEMU_ACCEL_FLAGS \
            -M ${{ steps.vmparams.outputs.machine }} \
            -m ${{ steps.vmparams.outputs.mem }} \
            -smp ${{ steps.vmparams.outputs.vcpu }} \
            -display none \
            -monitor none \
            -chardev socket,id=serial0,path=/tmp/qemu-serial.sock,server=on,wait=off \
            -serial chardev:serial0 \
            ${{ steps.driveflags.outputs.drive_flags }} \
            -netdev user,id=net0,hostfwd=tcp::9180-:80 \
            -device virtio-net-pci,netdev=net0 \
            &>/tmp/qemu-chr.log &
          echo $! > /tmp/qemu-chr.pid
          echo "QEMU PID=$(cat /tmp/qemu-chr.pid)"

      - name: Show early QEMU boot output
        # Wait 15s then dump whatever QEMU has logged — catches immediate crashes
        # (bad firmware, wrong disk interface, missing file) before the health poll.
        run: |
          sleep 15
          PID=$(cat /tmp/qemu-chr.pid 2>/dev/null)
          echo "=== QEMU log (first 100 lines, 15s after start) ==="
          head -100 /tmp/qemu-chr.log || true
          echo "=== QEMU process check ==="
          if kill -0 "$PID" 2>/dev/null; then
            # Show CPU usage — 0% CPU means QEMU is stuck (not executing instructions)
            CPU_PCT=$(ps -p "$PID" -o %cpu= 2>/dev/null | tr -d ' ')
            CPU_TIME=$(ps -p "$PID" -o time= 2>/dev/null | tr -d ' ')
            RSS=$(ps -p "$PID" -o rss= 2>/dev/null | tr -d ' ')
            echo "QEMU is running: CPU=${CPU_PCT}% TIME=$CPU_TIME RSS=${RSS}kB"
            if [ "$(echo "$CPU_PCT < 1.0" | bc -l 2>/dev/null)" = "1" ]; then
              echo "::warning::QEMU has near-zero CPU — it may be stuck (check serial/display config)"
            fi
          else
            echo "::error::QEMU process has already exited — check log above"
            exit 1
          fi

      - name: Wait for RouterOS HTTP server to respond
        # Poll the WebFig root (returns HTTP 200 without credentials).
        # Do NOT poll /rest/ here — that returns HTTP 401 and curl --fail would
        # falsely report RouterOS as down even when it is running correctly.
        run: |
          ATTEMPTS=$BOOT_TIMEOUT_ATTEMPTS
          echo "Waiting for RouterOS HTTP server at $HEALTH_URL (up to $((ATTEMPTS * 10))s)..."
          for i in $(seq 1 "$ATTEMPTS"); do
            if curl -sS -m 5 --fail "$HEALTH_URL/" > /dev/null 2>&1; then
              echo "RouterOS HTTP server is up after $i attempt(s)."
              exit 0
            fi
            echo "Attempt $i/$ATTEMPTS: not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "::error::RouterOS did not start within $((ATTEMPTS * 10)) seconds"
          echo "=== QEMU log ==="
          cat /tmp/qemu-chr.log || true
          exit 1

      - name: Verify RouterOS REST API with credentials
        run: |
          echo "Checking REST API at $API_BASE/ip/address ..."
          curl -sS --fail "$API_BASE/ip/address" | head -c 500
          echo ""

      - name: Check RouterOS installation status
        id: check-installation
        # check-installation is a POST; "duration" tells RouterOS how long to run
        # the disk/filesystem check.  It returns intermediate progress plus a final
        # result as a JSON array — we check the last element for "installation is ok".
        #
        # aarch64: SKIP this check entirely.  The ARM checker binary always returns
        # HTTP 400 "damaged system package: bad image" in QEMU because UEFI generates
        # an empty DTB → no /ram/ capability files → the ARM checker (which lacks the
        # /bin/milo fallback present in the x86 checker) returns non-zero.  This is a
        # MikroTik firmware limitation, not a QEMU configuration problem.  RouterOS
        # itself boots and runs correctly — only this verification binary fails.
        # See Lab/qemu-arm64/NOTES.md for the full reverse-engineering analysis.
        run: |
          ARCH="${{ steps.vmparams.outputs.arch }}"
          if [ "$ARCH" = "aarch64" ]; then
            echo "::notice::Skipping check-installation on aarch64 (ARM checker always fails in QEMU — see CLAUDE.md)"
            echo "status=skipped-aarch64" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Calling $API_BASE/system/check-installation (POST with duration=30s) ..."
          HTTP_CODE=$(curl -sS -o /tmp/check-result.json -w "%{http_code}" -X POST \
            -H 'Content-Type: application/json' \
            -d '{"duration":"30s"}' \
            "$API_BASE/system/check-installation")
          RESULT=$(cat /tmp/check-result.json)
          echo "HTTP $HTTP_CODE — Response: $RESULT"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::check-installation failed (HTTP $HTTP_CODE): $RESULT"
            exit 1
          fi
          STATUS=$(echo "$RESULT" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
          except json.JSONDecodeError as e:
              print('ERROR: invalid JSON: ' + str(e), file=sys.stderr)
              sys.exit(1)
          if isinstance(data, list) and len(data) > 0:
              print(data[-1].get('status', ''))
          elif isinstance(data, dict):
              print(data.get('status', ''))
          else:
              print('ERROR: unexpected response type: ' + type(data).__name__, file=sys.stderr)
              sys.exit(1)
          ")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "installation is ok" ]; then
            echo "RouterOS installation check passed: $STATUS"
          else
            echo "::error::check-installation failed — status: '$STATUS'"
            exit 1
          fi

      - name: Upload QEMU log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-log-${{ matrix.machine }}
          path: /tmp/qemu-chr.log

      - name: Stop QEMU
        if: always()
        run: |
          if [ -f /tmp/qemu-chr.pid ]; then
            kill "$(cat /tmp/qemu-chr.pid)" 2>/dev/null || true
            echo "QEMU stopped."
          fi
