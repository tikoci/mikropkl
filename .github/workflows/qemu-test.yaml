name: "Test: QEMU Direct Boot"

# Builds all QEMU manifests and boots them via qemu.sh on x86_64 and aarch64 runners.
# x86_64 runner: boots ALL machines (x86 native via KVM, aarch64 cross-arch via TCG).
# aarch64 runner: boots only native aarch64 machines (x86 cross-arch not viable).
# qemu.cfg ↔ config.pkl consistency is checked for ALL machines on both runners.
# This validates the full pipeline:
#   pkl → config.plist → qemu.cfg → qemu.sh → running QEMU process → REST API
#
# Verification per machine:
#   1. qemu.cfg ↔ config.pkl consistency (machine type, memory, CPUs, drives)
#   2. QEMU process flags (correct binary, accelerator, pflash, port forwarding)
#   3. REST API endpoints + check-installation (x86 only)
#
# Cross-arch notes:
#   x86_64 on aarch64: NOT viable — x86 I/O port emulation has no ARM equivalent.
#   aarch64 on x86_64: Works well (~20s) — EDK2 UEFI uses 64-bit MMIO throughout.

on:
  workflow_dispatch:
    inputs:
      rosver:
        type: string
        description: 'RouterOS Version (e.g. 7.22, 7.22rc2, 7.22beta4, stable)'
        required: true
        default: "stable"
      pklversion:
        type: string
        description: 'pkl Version'
        required: true
        default: "0.30.2"

jobs:
  # ── Phase 1: build all QEMU machine bundles ───────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      chr-version: ${{ steps.resolve-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          echo "::group::apt-get install"
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends qemu-utils wget make unzip
          echo "::endgroup::"

      - name: Install Apple pkl
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/${{ inputs.pklversion }}/pkl-linux-amd64"
          chmod +x pkl && sudo cp pkl /usr/local/bin/pkl

      - name: Resolve RouterOS version
        id: resolve-version
        run: |
          VERSION=$(CHR_VERSION=${{ inputs.rosver }} pkl eval ./Pkl/chr-version.pkl)
          echo "Resolved RouterOS version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build machine bundles (make)
        run: make CHR_VERSION=${{ steps.resolve-version.outputs.version }}

      - name: Upload built Machines as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Machines
          path: ./Machines
          retention-days: 1

  # ── Phase 2: boot-test — one job per runner architecture ──────────────────
  # Each runner boots and tests ALL machines: native-arch via KVM (when available)
  # or TCG, cross-arch via TCG.  Both runners validate qemu.cfg ↔ config.pkl
  # consistency and boot every machine.
  test:
    needs: build
    name: "test (${{ matrix.runner-arch }})"
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            runner-arch: x86_64
            pkl-arch: amd64
          - runner: ubuntu-24.04-arm
            runner-arch: aarch64
            pkl-arch: aarch64
      fail-fast: false

    runs-on: ${{ matrix.runner }}

    env:
      HEALTH_PORT_BASE: "9180"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built Machines artifact
        uses: actions/download-artifact@v4
        with:
          name: Machines
          path: ./Machines

      - name: Install QEMU (both architectures)
        run: |
          echo "::group::apt-get install"
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends qemu-system-x86 qemu-system-arm qemu-efi-aarch64 ovmf jq python3 socat
          echo "::endgroup::"

      - name: Log QEMU versions
        run: |
          qemu-system-x86_64 --version 2>/dev/null || echo "qemu-system-x86_64 not installed"
          qemu-system-aarch64 --version 2>/dev/null || echo "qemu-system-aarch64 not installed"
          uname -m

      - name: Install Apple pkl
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/${{ inputs.pklversion }}/pkl-linux-${{ matrix.pkl-arch }}"
          chmod +x pkl && sudo cp pkl /usr/local/bin/pkl

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          if [ -w /dev/kvm 2>/dev/null ]; then
            echo "KVM_AVAIL=1" >> $GITHUB_ENV
            echo "KVM is available"
          else
            echo "KVM_AVAIL=0" >> $GITHUB_ENV
            echo "::notice::KVM not available — machines will use TCG"
          fi

      - name: Make qemu.sh scripts executable
        run: make qemu-chmod

      - name: "Verify: qemu.cfg ↔ config.pkl consistency"
        run: |
          # Validate that each qemu.cfg matches its config.pkl source of truth.
          # config.pkl (PCF format) is the pkl-generated single source of truth.
          # This closes the loop: pkl manifests → config.pkl → qemu.cfg.
          ERRORS=0
          for UTM_DIR in Machines/*.utm; do
            [ -f "$UTM_DIR/qemu.cfg" ] || continue
            VMNAME=$(basename "$UTM_DIR" .utm)
            echo "::group::Verify $VMNAME"

            CFG_PKL="$UTM_DIR/config.pkl"
            CFG_INI="$UTM_DIR/qemu.cfg"
            OK=1

            # Extract expected values from config.pkl (pkl PCF = source of truth)
            # System.Target may not exist for Apple backend; derive from architecture.
            # Apple x86_64 uses "pc" (i440fx) in qemu.cfg for simpler PCI — faster cross-arch TCG.
            EXP_TARGET=$(pkl eval -x 'System.Target' "$CFG_PKL" 2>/dev/null \
              || pkl eval -x 'if (System.Architecture == "aarch64") "virt" else "pc"' "$CFG_PKL")
            EXP_MEM=$(pkl eval -x 'System.MemorySize' "$CFG_PKL")
            EXP_CPUS=$(pkl eval -x 'if (System.CPUCount == 0) 1 else System.CPUCount' "$CFG_PKL")
            EXP_DRIVES=$(pkl eval -x 'Drive.toList().length' "$CFG_PKL")
            EXP_IMAGES=$(pkl eval -x 'Drive.toList().map((d) -> d.ImageName).join(",")' "$CFG_PKL")
            EXP_ARCH=$(pkl eval -x 'System.Architecture' "$CFG_PKL")
            echo "config.pkl: arch=$EXP_ARCH mem=${EXP_MEM}M cpus=$EXP_CPUS disks=$EXP_DRIVES target=$EXP_TARGET"

            # Verify qemu.cfg sections match config.pkl
            CFG_TEXT=$(cat "$CFG_INI")

            # Machine type
            GOT=$(echo "$CFG_TEXT" | awk '/^\[machine\]/{getline; gsub(/.*= "|"/, ""); print}')
            if [ "$GOT" != "$EXP_TARGET" ]; then
              echo "::error::$VMNAME: machine type mismatch: cfg=$GOT pkl=$EXP_TARGET"
              OK=0
            fi

            # Memory
            GOT=$(echo "$CFG_TEXT" | awk '/^\[memory\]/{getline; gsub(/.*= "|M"/, ""); print}')
            if [ "$GOT" != "$EXP_MEM" ]; then
              echo "::error::$VMNAME: memory mismatch: cfg=${GOT}M pkl=${EXP_MEM}M"
              OK=0
            fi

            # CPUs
            GOT=$(echo "$CFG_TEXT" | awk '/^\[smp-opts\]/{getline; gsub(/.*= "|"/, ""); print}')
            if [ "$GOT" != "$EXP_CPUS" ]; then
              echo "::error::$VMNAME: CPU count mismatch: cfg=$GOT pkl=$EXP_CPUS"
              OK=0
            fi

            # Drive count
            GOT=$(echo "$CFG_TEXT" | grep -c '^\[drive ')
            if [ "$GOT" != "$EXP_DRIVES" ]; then
              echo "::error::$VMNAME: drive count mismatch: cfg=$GOT pkl=$EXP_DRIVES"
              OK=0
            fi

            # Drive image names
            IFS=',' read -ra IMGS <<< "$EXP_IMAGES"
            for IMG in "${IMGS[@]}"; do
              if ! echo "$CFG_TEXT" | grep -q "$IMG"; then
                echo "::error::$VMNAME: image $IMG missing from qemu.cfg"
                OK=0
              fi
            done

            if [ "$OK" = "1" ]; then
              echo "✓ qemu.cfg matches config.pkl"
            else
              ERRORS=$((ERRORS + 1))
            fi
            echo "::endgroup::"
          done
          [ "$ERRORS" -eq 0 ] || { echo "::error::$ERRORS machine(s) failed verification"; exit 1; }

      - name: "Boot and test all QEMU machines"
        run: |
          RUNNER_ARCH="${{ matrix.runner-arch }}"
          PORT_BASE=${{ env.HEALTH_PORT_BASE }}
          PORT_OFFSET=0
          FAILED=0
          PASSED=0
          SKIPPED=0
          TIMING_RESULTS=""

          for UTM_DIR in Machines/*.utm; do
            [ -f "$UTM_DIR/qemu.cfg" ] || continue
            VMNAME=$(basename "$UTM_DIR" .utm)
            echo "::group::Boot $VMNAME"

            # ── Extract VM config from config.pkl (source of truth) ──
            CFG_PKL="$UTM_DIR/config.pkl"
            VM_ARCH=$(pkl eval -x 'System.Architecture' "$CFG_PKL")
            VM_MEM=$(pkl eval -x 'System.MemorySize' "$CFG_PKL")
            VM_CPUS=$(pkl eval -x 'if (System.CPUCount == 0) 1 else System.CPUCount' "$CFG_PKL")
            VM_DISKS=$(pkl eval -x 'Drive.toList().length' "$CFG_PKL")

            # ── Determine expected accelerator ──
            # KVM only when host and guest architectures match
            if [ "$VM_ARCH" = "$RUNNER_ARCH" ] && [ "$KVM_AVAIL" = "1" ]; then
              EXPECTED_ACCEL="kvm"
            else
              EXPECTED_ACCEL="tcg"
            fi

            # ── Boot timeout (poll every 5s): KVM=30s, TCG=60s ──
            if [ "$EXPECTED_ACCEL" = "kvm" ]; then
              TIMEOUT_ATTEMPTS=6     # 30s
            else
              TIMEOUT_ATTEMPTS=12    # 60s
            fi

            # Unique port per machine to avoid TCP TIME_WAIT collisions
            PORT=$((PORT_BASE + PORT_OFFSET))
            PORT_OFFSET=$((PORT_OFFSET + 1))

            echo "  Config: arch=$VM_ARCH mem=${VM_MEM}M cpus=$VM_CPUS disks=$VM_DISKS"
            echo "  Runner: $RUNNER_ARCH, KVM=$KVM_AVAIL → expected accel=$EXPECTED_ACCEL"
            echo "  Port: $PORT, Timeout: $((TIMEOUT_ATTEMPTS * 5))s"

            # ── Skip x86_64 cross-arch on aarch64 runner ──
            # x86_64 on ARM64 TCG is not viable — I/O port emulation has no ARM
            # hardware equivalent.  Even OVMF + modern virtio + pc machine + HPET
            # cannot boot within 300s (tested over 16 CI iterations).
            # aarch64 on x86_64 works fine (~20s) — EDK2 uses 64-bit MMIO.
            if [ "$VM_ARCH" != "$RUNNER_ARCH" ] && [ "$RUNNER_ARCH" = "aarch64" ]; then
              echo "::warning::$VMNAME: skipping x86_64 on aarch64 (not viable — TCG I/O port bottleneck)"
              SKIPPED=$((SKIPPED + 1))
              TIMING_RESULTS="${TIMING_RESULTS}  ⊘ ${VMNAME}: skipped (x86_64 on aarch64)\n"
              echo "::endgroup::"
              continue
            fi

            # ── Clean stale files and start via qemu.sh ──
            BOOT_START=$(date +%s)
            SERIAL_LOG="/tmp/qemu-${VMNAME}-serial.log"
            DEBUG_LOG="/tmp/qemu-${VMNAME}-debug.log"
            rm -f "/tmp/qemu-${VMNAME}.pid" "/tmp/qemu-${VMNAME}.log" \
                  "/tmp/qemu-${VMNAME}-serial.sock" "/tmp/qemu-${VMNAME}-vars.fd" \
                  "/tmp/qemu-${VMNAME}-monitor.sock" \
                  "$SERIAL_LOG" "$DEBUG_LOG"
            # Enable QEMU guest error/unimplemented instruction logging for diagnostics
            QEMU_EXTRA="-d guest_errors,unimp -D $DEBUG_LOG" \
              sh "$UTM_DIR/qemu.sh" --background --port "$PORT"
            sleep 2

            # ── Start serial capture immediately (socat in background) ──
            # The serial chardev socket doesn't buffer historical output, so we
            # must connect from the start to see SeaBIOS/UEFI and kernel messages.
            SERIAL_SOCK="/tmp/qemu-${VMNAME}-serial.sock"
            SOCAT_PID=""
            if [ -S "$SERIAL_SOCK" ]; then
              socat -u UNIX-CONNECT:"$SERIAL_SOCK" "CREATE:$SERIAL_LOG" &
              SOCAT_PID=$!
              echo "  Serial capture PID=$SOCAT_PID → $SERIAL_LOG"
            else
              echo "  ⚠ Serial socket not yet available for capture"
            fi
            sleep 3

            PID_FILE="/tmp/qemu-${VMNAME}.pid"
            if [ ! -f "$PID_FILE" ]; then
              echo "::error::$VMNAME: no PID file found"
              [ -n "$SOCAT_PID" ] && kill "$SOCAT_PID" 2>/dev/null || true
              FAILED=$((FAILED + 1))
              TIMING_RESULTS="${TIMING_RESULTS}  ✗ ${VMNAME}: failed (no PID)\n"
              echo "::endgroup::"
              continue
            fi
            PID=$(cat "$PID_FILE")
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "::error::$VMNAME: QEMU process exited immediately"
              cat "/tmp/qemu-${VMNAME}.log" 2>/dev/null | tail -30
              [ -n "$SOCAT_PID" ] && kill "$SOCAT_PID" 2>/dev/null || true
              FAILED=$((FAILED + 1))
              TIMING_RESULTS="${TIMING_RESULTS}  ✗ ${VMNAME}: failed (QEMU exited)\n"
              echo "::endgroup::"
              continue
            fi

            # ── Resolve actual QEMU PID ──
            # With exec fix, PID IS the QEMU process. Without exec, PID is the
            # sh -c wrapper and actual QEMU is a child. Resolve the real PID.
            QEMU_PID="$PID"
            CHILD_PID=$(pgrep -P "$PID" 2>/dev/null | head -1)
            if [ -n "$CHILD_PID" ]; then
              echo "  ⚠ PID $PID is wrapper (sh -c), actual QEMU is child PID $CHILD_PID"
              QEMU_PID="$CHILD_PID"
            fi

            # ── Verify QEMU process command line ──
            CMDLINE=$(cat /proc/$QEMU_PID/cmdline 2>/dev/null | tr '\0' ' ' || cat /proc/$PID/cmdline | tr '\0' ' ')

            # Correct binary
            EXPECTED_BIN="qemu-system-$([ "$VM_ARCH" = "aarch64" ] && echo aarch64 || echo x86_64)"
            if echo "$CMDLINE" | grep -q "$EXPECTED_BIN"; then
              echo "  ✓ Binary: $EXPECTED_BIN"
            else
              echo "  ::error::$VMNAME: expected $EXPECTED_BIN in command line"
            fi

            # Accelerator
            if echo "$CMDLINE" | grep -q "\-accel $EXPECTED_ACCEL"; then
              echo "  ✓ Accelerator: $EXPECTED_ACCEL"
            else
              ACTUAL_ACCEL=$(echo "$CMDLINE" | grep -oP '(?<=-accel )\S+' || echo "unknown")
              echo "  ::warning::$VMNAME: expected accel=$EXPECTED_ACCEL, got=$ACTUAL_ACCEL"
            fi

            # pflash for UEFI machines (aarch64 always, Apple x86_64 uses OVMF)
            BACKEND=$(pkl eval -x 'Backend' "$CFG_PKL" 2>/dev/null || echo "QEMU")
            if [ "$VM_ARCH" = "aarch64" ] || [ "$BACKEND" = "Apple" ]; then
              if echo "$CMDLINE" | grep -q "pflash"; then
                echo "  ✓ UEFI pflash present"
              else
                echo "  ::error::$VMNAME: missing pflash for UEFI machine"
              fi
            fi

            # Port forwarding
            if echo "$CMDLINE" | grep -q "hostfwd=tcp::${PORT}-:80"; then
              echo "  ✓ Port forwarding: host ${PORT} → guest 80"
            else
              echo "  ::error::$VMNAME: port forwarding not found in command line"
            fi

            # ── Wait for RouterOS HTTP (poll every 5s) ──
            BOOTED=0
            POLL=5
            for i in $(seq 1 "$TIMEOUT_ATTEMPTS"); do
              # Bail early if QEMU process died
              if ! kill -0 "$QEMU_PID" 2>/dev/null; then
                echo "::error::$VMNAME: QEMU process died during boot"
                break
              fi
              if curl -sS -m 3 --fail "http://localhost:${PORT}/" > /dev/null 2>&1; then
                BOOT_ELAPSED=$(( $(date +%s) - BOOT_START ))
                echo "  ✓ RouterOS HTTP up after ${BOOT_ELAPSED}s"
                BOOTED=1
                break
              fi
              STATE=$(awk '{print $3}' /proc/$QEMU_PID/stat 2>/dev/null || echo "?")
              CPU=$(ps -p "$QEMU_PID" -o %cpu= 2>/dev/null || echo "?")
              echo "  Attempt $i/$TIMEOUT_ATTEMPTS: not ready (qemu_pid=$QEMU_PID state=$STATE cpu=${CPU}%) — waiting ${POLL}s"
              sleep "$POLL"
            done

            if [ "$BOOTED" = "0" ]; then
              echo "::error::$VMNAME: boot timeout after $((TIMEOUT_ATTEMPTS * POLL))s"
              echo "--- QEMU stderr log ---"
              cat "/tmp/qemu-${VMNAME}.log" 2>/dev/null | tail -20 || echo "(empty)"
              echo "--- QEMU debug log (guest_errors,unimp) ---"
              if [ -s "/tmp/qemu-${VMNAME}-debug.log" ]; then
                wc -l < "/tmp/qemu-${VMNAME}-debug.log" | xargs -I{} echo "  ({} lines total)"
                tail -30 "/tmp/qemu-${VMNAME}-debug.log"
              else
                echo "(no debug output — no guest errors or unimplemented instructions)"
              fi
              echo "--- QEMU monitor: CPU state ---"
              MONITOR_SOCK="/tmp/qemu-${VMNAME}-monitor.sock"
              if [ -S "$MONITOR_SOCK" ]; then
                # Query CPU registers via HMP monitor to see where guest is stuck
                echo "info cpus" | socat - UNIX-CONNECT:"$MONITOR_SOCK" 2>/dev/null | head -10 || echo "(monitor query failed)"
                sleep 0.5
                echo "info registers" | socat - UNIX-CONNECT:"$MONITOR_SOCK" 2>/dev/null | head -30 || echo "(monitor query failed)"
              else
                echo "(no monitor socket available)"
              fi
              echo "--- Process info (QEMU pid=$QEMU_PID, wrapper pid=$PID) ---"
              ps -p "$QEMU_PID" -o pid,stat,%cpu,%mem,time,args 2>/dev/null || echo "(QEMU process ended)"
              if [ "$QEMU_PID" != "$PID" ]; then
                ps -p "$PID" -o pid,stat,%cpu,%mem,time,args 2>/dev/null || true
              fi
              echo "--- Listening ports ---"
              ss -tlnp 2>/dev/null | grep -E "$PORT|State" || echo "(port $PORT not listening)"
              echo "--- Serial console (captured from boot start, last 50 lines) ---"
              if [ -n "$SOCAT_PID" ]; then
                kill "$SOCAT_PID" 2>/dev/null || true
                wait "$SOCAT_PID" 2>/dev/null || true
              fi
              if [ -s "$SERIAL_LOG" ]; then
                wc -c < "$SERIAL_LOG" | xargs -I{} echo "  (serial log: {} bytes)"
                tail -50 "$SERIAL_LOG"
              else
                echo "(no serial output captured — VM may not output to serial)"
              fi
              echo "--- All QEMU processes ---"
              ps aux 2>/dev/null | grep -E "qemu-system" | grep -v grep || echo "(none)"
              # Kill QEMU process and wrapper (exec fix makes these the same PID)
              kill "$QEMU_PID" 2>/dev/null || true
              [ "$QEMU_PID" != "$PID" ] && kill "$PID" 2>/dev/null || true
              sleep 2
              FAILED=$((FAILED + 1))
              TIMING_RESULTS="${TIMING_RESULTS}  ✗ ${VMNAME}: timeout $((TIMEOUT_ATTEMPTS * POLL))s (${EXPECTED_ACCEL})\n"
              echo "::endgroup::"
              continue
            fi

            # ── REST API checks ──
            API="http://admin:@localhost:${PORT}/rest"
            API_OK=1

            for ENDPOINT in system/resource interface ip/address ip/route ipv6/address ipv6/route; do
              if curl -sS --fail "$API/$ENDPOINT" > /dev/null 2>&1; then
                echo "  ✓ GET /$ENDPOINT"
              else
                echo "  ::error::$VMNAME: GET /$ENDPOINT failed"
                API_OK=0
              fi
            done

            # Detailed output for system/resource
            echo "  /system/resource:"
            curl -sS --fail "$API/system/resource" 2>/dev/null | python3 -m json.tool | head -15 | sed 's/^/    /'

            # check-installation (x86 only — ARM checker always fails in QEMU)
            if [ "$VM_ARCH" != "aarch64" ]; then
              HTTP_CODE=$(curl -sS -o /tmp/check-result.json -w "%{http_code}" -X POST \
                -H 'Content-Type: application/json' -d '{"duration":"30s"}' \
                "$API/system/check-installation")
              if [ "$HTTP_CODE" -lt 400 ]; then
                echo "  ✓ POST /system/check-installation (HTTP $HTTP_CODE)"
              else
                echo "  ::error::$VMNAME: check-installation failed (HTTP $HTTP_CODE)"
                cat /tmp/check-result.json 2>/dev/null
                API_OK=0
              fi
            else
              echo "  ⊘ Skipping check-installation on aarch64 (see CLAUDE.md)"
            fi

            # ── Stop ──
            if [ -n "$SOCAT_PID" ]; then
              kill "$SOCAT_PID" 2>/dev/null || true
              wait "$SOCAT_PID" 2>/dev/null || true
            fi
            kill "$QEMU_PID" 2>/dev/null || true
            [ "$QEMU_PID" != "$PID" ] && kill "$PID" 2>/dev/null || true
            sleep 2
            rm -f "$PID_FILE"

            if [ "$API_OK" = "1" ]; then
              PASSED=$((PASSED + 1))
              TIMING_RESULTS="${TIMING_RESULTS}  ✓ ${VMNAME}: ${BOOT_ELAPSED}s (${EXPECTED_ACCEL})\n"
              echo "  ✓ $VMNAME: ALL CHECKS PASSED"
            else
              FAILED=$((FAILED + 1))
              TIMING_RESULTS="${TIMING_RESULTS}  ✗ ${VMNAME}: ${BOOT_ELAPSED}s (${EXPECTED_ACCEL}) — API failures\n"
              echo "  ✗ $VMNAME: SOME CHECKS FAILED"
            fi
            echo "::endgroup::"
          done

          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "Boot timing — $RUNNER_ARCH runner ($PASSED passed, $FAILED failed, $SKIPPED skipped)"
          echo "══════════════════════════════════════════════════════════"
          printf "$TIMING_RESULTS"
          echo "══════════════════════════════════════════════════════════"
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Upload QEMU logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-logs-${{ matrix.runner-arch }}
          path: |
            /tmp/qemu-*.log
            /tmp/qemu-*-serial.log
            /tmp/qemu-*-debug.log
