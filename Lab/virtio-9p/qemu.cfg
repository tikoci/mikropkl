# Lab: virtio-9p-pci test — x86_64 UEFI with Plan 9 host filesystem sharing
#
# Based on chr.x86_64.apple qemu.cfg, with added virtio-9p-pci device.
# Points to ../../Machines/chr.x86_64.apple.7.23beta2.utm/Data/ for the disk image.
#
# The 9p device shares ./shared/ (relative to this directory) as mount_tag "host"
#
# STATUS: The x86_64 kernel has CONFIG_9P_FS=y and the virtio driver binds to the
# device (confirmed via QEMU monitor qtree). However, RouterOS does NOT expose a
# command to mount 9p filesystems — /disk/add only supports nfs, smb, iscsi types
# (even with rose-storage installed). This needs a MikroTik feature request.
#
# See NOTES.md for full analysis.
#
# Usage:
#   ./qemu.sh                     # foreground, serial on stdio
#   ./qemu.sh --background        # background, serial to socket

[machine]
  type = "pc"
  hpet = "on"

[memory]
  size = "1024M"

[smp-opts]
  cpus = "2"

[drive "drive0"]
  file = "../../Machines/chr.x86_64.apple.7.23beta2.utm/Data/chr-efi.img"
  format = "raw"
  if = "none"

[device "virtio-blk-drive0"]
  driver = "virtio-blk-pci"
  drive = "drive0"
  disable-legacy = "on"

[device "nic0"]
  driver = "virtio-net-pci"
  netdev = "net0"
  mac = "0e:9e:1a:b0:9e:01"
  disable-legacy = "on"

# ── Plan 9 filesystem sharing (virtio-9p-pci) ──
# Shares the local ./shared/ directory into the guest.
# The mount_tag "host" is used by RouterOS: /disk/mount host 9p
[fsdev "fsdev0"]
  fsdriver = "local"
  path = "./shared"
  security_model = "none"

[device "virtio-9p-host"]
  driver = "virtio-9p-pci"
  fsdev = "fsdev0"
  mount_tag = "host"
  disable-legacy = "on"
